<div class="row justify-content-center mt-5">
  <div class="col-lg-5 col-md-7">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="bg-primary text-white rounded-3 d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px;font-size:1.8rem">
            <i class="bi bi-truck"></i>
          </div>
          <h4 class="fw-bold mb-1">Benvenuto</h4>
          <p class="text-muted small">Accedi all'area operatori</p>
        </div>
        <form (ngSubmit)="submit()" #loginForm="ngForm">
          <div class="mb-3">
            <label class="form-label fw-medium small text-uppercase text-muted">Email</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-envelope text-primary"></i></span>
              <input class="form-control form-control-lg" [(ngModel)]="email" name="email" type="email" placeholder="nome@corriere.it" required />
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-medium small text-uppercase text-muted">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-lock text-primary"></i></span>
              <input type="password" class="form-control form-control-lg" [(ngModel)]="password" name="password" placeholder="Inserisci password" required />
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" [disabled]="!loginForm.valid">
            <i class="bi bi-box-arrow-in-right me-2"></i>Accedi
          </button>
          <div class="text-center">
            <small class="text-muted">Non hai un account? <a routerLink="/register" class="text-decoration-none fw-medium">Registrati</a></small>
          </div>
          <div class="mt-3 alert alert-danger d-flex align-items-center gap-2 py-2" *ngIf="error">
            <i class="bi bi-exclamation-triangle"></i>
            <span>{{ error }}</span>
          </div>
        </form>
        <hr class="my-3">
        <div class="text-center">
          <small class="text-muted">
            <a routerLink="/tracking" class="text-decoration-none">
              <i class="bi bi-search me-1"></i>Traccia una spedizione
            </a>
          </small>
        </div>
      </div>
    </div>
  </div>
</div>
