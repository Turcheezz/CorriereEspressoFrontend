<div class="row justify-content-center mt-4">
  <div class="col-lg-6 col-md-8">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="bg-success text-white rounded-3 d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px;font-size:1.8rem">
            <i class="bi bi-person-plus"></i>
          </div>
          <h4 class="fw-bold mb-1">Registrazione Operatore</h4>
          <p class="text-muted small">Crea un nuovo account operatore</p>
        </div>
        <form (ngSubmit)="submit()" #regForm="ngForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-medium small text-uppercase text-muted">Nome</label>
              <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-person text-success"></i></span>
                <input class="form-control" [(ngModel)]="nome" name="nome" placeholder="Mario" required />
              </div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-medium small text-uppercase text-muted">Cognome</label>
              <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-person text-success"></i></span>
                <input class="form-control" [(ngModel)]="cognome" name="cognome" placeholder="Rossi" required />
              </div>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium small text-uppercase text-muted">Email</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-envelope text-success"></i></span>
              <input class="form-control" [(ngModel)]="email" name="email" type="email" placeholder="nome@esempio.com" required />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium small text-uppercase text-muted">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-lock text-success"></i></span>
              <input type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="Scegli una password" required />
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-medium small text-uppercase text-muted">Conferma Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-lock-fill text-success"></i></span>
              <input type="password" class="form-control" [(ngModel)]="confermaPassword" name="confermaPassword" placeholder="Ripeti password" required />
            </div>
          </div>
          <button type="submit" class="btn btn-success btn-lg w-100 mb-3" [disabled]="!regForm.valid">
            <i class="bi bi-person-plus me-2"></i>Registrati
          </button>
          <div class="text-center">
            <small class="text-muted">Hai già un account? <a routerLink="/login" class="text-decoration-none fw-medium">Accedi</a></small>
          </div>
          <div class="mt-3 alert alert-success d-flex align-items-center gap-2 py-2" *ngIf="success">
            <i class="bi bi-check-circle"></i>
            <span>{{ success }}</span>
          </div>
          <div class="mt-3 alert alert-danger d-flex align-items-center gap-2 py-2" *ngIf="error">
            <i class="bi bi-exclamation-triangle"></i>
            <span>{{ error }}</span>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
