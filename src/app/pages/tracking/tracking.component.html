<div class="row justify-content-center mt-4">
  <div class="col-lg-6 col-md-8">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="bg-info text-white rounded-3 d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px;font-size:1.8rem">
            <i class="bi bi-search"></i>
          </div>
          <h4 class="fw-bold mb-1">Tracciamento Spedizione</h4>
          <p class="text-muted small">Inserisci i dati per verificare lo stato della tua consegna</p>
        </div>
        <form (ngSubmit)="search()" #trackForm="ngForm">
          <div class="mb-3">
            <label class="form-label fw-medium small text-uppercase text-muted">Chiave di Tracking</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-upc-scan text-info"></i></span>
              <input class="form-control form-control-lg" [(ngModel)]="chiaveConsegna" name="chiave" placeholder="TRK-2026-000001" required />
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-medium small text-uppercase text-muted">Data di Ritiro</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-calendar text-info"></i></span>
              <input type="date" class="form-control form-control-lg" [(ngModel)]="dataRitiro" name="dataRitiro" required />
            </div>
          </div>
          <button type="submit" class="btn btn-info btn-lg w-100 mb-3 text-white" [disabled]="!trackForm.valid || loading">
            <i class="bi bi-search me-2"></i>{{ loading ? 'Cerco...' : 'Cerca' }}
          </button>
          <div class="mt-3 alert alert-danger d-flex align-items-center gap-2 py-2" *ngIf="error">
            <i class="bi bi-exclamation-triangle"></i>
            <span>{{ error }}</span>
          </div>
        </form>

        <div class="mt-4" *ngIf="result">
          <div class="card bg-light border-0 rounded-3">
            <div class="card-body p-4">
              <h5 class="fw-bold mb-3">Risultato Tracciamento</h5>
              <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Stato:</span>
                <span class="fw-bold">
                  <span [class]="'badge-status badge ' + getStatoBadge(result.stato)">{{ result.stato }}</span>
                </span>
              </div>
              <div class="d-flex justify-content-between mb-2">
                <span class="text-muted">Data ritiro:</span>
                <span class="fw-bold">{{ result.dataRitiro | date:'dd/MM/yyyy' }}</span>
              </div>
              <div class="d-flex justify-content-between">
                <span class="text-muted">Data consegna:</span>
                <span class="fw-bold">{{ result.dataConsegna ? (result.dataConsegna | date:'dd/MM/yyyy') : '--' }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
